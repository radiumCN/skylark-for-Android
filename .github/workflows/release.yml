name: Release

# 推送 tag v* 触发：校验版本一致 → 签名打包 → 生成清单 → 发布 GitHub Release。
# 版本单一源：gradle/libs.versions.toml 的 appVersionName，必须与 tag 一致。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version & channel
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CATALOG_VER=$(grep -E '^appVersionName\s*=' gradle/libs.versions.toml | sed -E 's/.*"(.*)".*/\1/')
          echo "tag=$TAG catalog=$CATALOG_VER"
          if [ "$TAG" != "$CATALOG_VER" ]; then
            echo "::error::Tag ($TAG) 与 libs.versions.toml 的 appVersionName ($CATALOG_VER) 不一致"
            exit 1
          fi
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      # 下载内核 (若 app 依赖 libbox.aar，取消注释并指向 build-libbox 产物)
      # - name: Download libbox.aar
      #   run: |
      #     mkdir -p app/libs
      #     curl -L -o app/libs/libbox.aar "<artifact-or-release-url>"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/skylark.keystore"

      - name: Build release APK
        env:
          SKYLARK_KEYSTORE_PATH: ${{ runner.temp }}/skylark.keystore
          SKYLARK_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SKYLARK_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SKYLARK_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Collect artifacts & manifest
        id: artifacts
        run: |
          OUT=release-artifacts
          mkdir -p "$OUT"
          VER="${{ steps.ver.outputs.version }}"
          for apk in app/build/outputs/apk/release/*.apk; do
            cp "$apk" "$OUT/skylark-$VER-$(basename "$apk")"
          done
          (cd "$OUT" && sha256sum *.apk > SHA256SUMS)
          # latest.json 由版本源生成（下载 url 在 Release 上传后由客户端按固定命名拼接）
          cat > "$OUT/latest.json" <<EOF
          {
            "${{ steps.ver.outputs.prerelease == 'true' && 'beta' || 'stable' }}": {
              "version": "$VER",
              "notes": "See GitHub Release $GITHUB_REF_NAME",
              "assets": "https://github.com/${{ github.repository }}/releases/tag/$GITHUB_REF_NAME"
            }
          }
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.ver.outputs.prerelease }}
          generate_release_notes: true
          files: |
            release-artifacts/*.apk
            release-artifacts/SHA256SUMS
            release-artifacts/latest.json
