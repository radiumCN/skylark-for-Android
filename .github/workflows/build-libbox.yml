name: Build libbox.aar

# 从官方 SagerNet/sing-box 源码用 gomobile 构建多架构 libbox.aar。
# 手动触发，指定 sing-box 版本 tag；产物作为 artifact 供 app 消费。
on:
  workflow_dispatch:
    inputs:
      singbox_ref:
        description: "sing-box git tag/branch (例如 v1.11.0)"
        required: true
        default: "main"

jobs:
  build-libbox:
    name: gomobile bind libbox
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sing-box
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ github.event.inputs.singbox_ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: gomobile init
        run: gomobile init

      - name: Build libbox.aar
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          gomobile bind -v \
            -target=android/arm64,android/arm,android/amd64 \
            -androidapi 21 \
            -tags "with_gvisor,with_quic,with_wireguard,with_utls,with_clash_api,with_dhcp" \
            -o libbox.aar \
            ./experimental/libbox

      - name: Upload libbox.aar
        uses: actions/upload-artifact@v4
        with:
          name: libbox-${{ github.event.inputs.singbox_ref }}
          path: libbox.aar
          if-no-files-found: error
